name: Deploy to VPS

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: ${{ secrets.KNOWN_HOSTS }}
          
      - name: Deploy to VPS
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
        run: |
          ssh -o StrictHostKeyChecking=no $SSH_USERNAME@$SSH_HOST << 'EOF'
            # Create directory if it doesn't exist
            mkdir -p /var/www/html/baust
            cd /var/www/html/baust
            
            # Initialize git if not already initialized
            if [ ! -d .git ]; then
              git init
              git remote add origin https://github.com/sharansifat/baust.git
            fi
            
            # Fetch and reset to match remote
            git fetch origin master
            git reset --hard origin/master
            
            # Install dependencies and build (uncomment if needed)
            # npm install
            # npm run build
            
            # Restart service (uncomment if needed)
            # pm2 restart app || pm2 start app.js
            
            echo "Deployment completed successfully!"
          EOF
